ixpacks · TOML
[phases.setup]
nixPkgs = ["php84", "php84Extensions.pdo", "php84Extensions.pdo_mysql", "php84Extensions.mbstring", "php84Extensions.tokenizer", "php84Extensions.xml", "php84Extensions.curl", "php84Extensions.zip", "php84Extensions.dom", "php84Extensions.fileinfo", "composer"]
 
[phases.install]
cmds = ["composer install --no-dev --optimize-autoloader"]
 
[phases.build]
cmds = [
  "php artisan config:cache",
  "php artisan route:cache",
  "php artisan migrate --force",
  "php artisan db:seed --force"
]
 
[start]
cmd = "php artisan serve --host=0.0.0.0 --port=$PORT"